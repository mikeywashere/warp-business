<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FREETONE Color Picker</title>
<style>
  :root {
    --bg: #0e0e10;
    --bg2: #18181b;
    --bg3: #27272a;
    --fg: #fafafa;
    --fg2: #a1a1aa;
    --accent: #FF0066;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ────────────────────────────── */
  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    padding: 28px 40px;
    border-bottom: 2px solid var(--accent);
    display: flex; align-items: center; gap: 20px;
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 28px; font-weight: 800;
    background: linear-gradient(90deg, #FF0066, #FF6B35, #FFD700, #00FF88, #00B4D8, #7B2FBE, #FF0066);
    background-size: 300% 100%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: shimmer 6s linear infinite;
  }
  @keyframes shimmer { 0%{background-position:0%} 100%{background-position:300%} }
  header .badge {
    background: var(--accent); color: #fff;
    padding: 4px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 700;
  }
  header .subtitle { color: var(--fg2); font-size: 14px; margin-left: auto; }

  /* ── Layout ────────────────────────────── */
  .app { display: flex; height: calc(100vh - 92px); }

  /* ── Sidebar ───────────────────────────── */
  .sidebar {
    width: 300px; min-width: 260px;
    background: var(--bg2);
    border-right: 1px solid var(--bg3);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .search-box {
    padding: 16px;
    border-bottom: 1px solid var(--bg3);
  }
  .search-box input {
    width: 100%; padding: 10px 14px;
    background: var(--bg3); border: 1px solid #3f3f46;
    border-radius: var(--radius); color: var(--fg);
    font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: #71717a; }

  .sort-row {
    padding: 0 16px 12px; display: flex; gap: 6px; flex-wrap: wrap;
  }
  .sort-btn {
    padding: 4px 10px; font-size: 11px; font-weight: 600;
    background: var(--bg3); border: 1px solid #3f3f46;
    border-radius: 6px; color: var(--fg2); cursor: pointer;
    transition: all 0.2s;
  }
  .sort-btn:hover { border-color: var(--accent); color: var(--fg); }
  .sort-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .group-filters {
    padding: 0 16px 12px;
    display: flex; flex-wrap: wrap; gap: 4px;
  }
  .group-btn {
    padding: 3px 8px; font-size: 10px; font-weight: 600;
    background: var(--bg3); border: 1px solid #3f3f46;
    border-radius: 5px; color: var(--fg2); cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .group-btn:hover { border-color: var(--accent); color: var(--fg); }
  .group-btn.active { background: #FF006630; border-color: var(--accent); color: var(--accent); }

  .swatch-count {
    padding: 6px 16px; font-size: 11px; color: var(--fg2);
    border-bottom: 1px solid var(--bg3);
  }

  .swatch-list {
    flex: 1; overflow-y: auto; padding: 8px;
  }
  .swatch-list::-webkit-scrollbar { width: 6px; }
  .swatch-list::-webkit-scrollbar-track { background: transparent; }
  .swatch-list::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }

  .swatch-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; border-radius: 8px;
    cursor: pointer; transition: background 0.15s;
    border: 2px solid transparent;
  }
  .swatch-item:hover { background: var(--bg3); }
  .swatch-item.selected { background: #FF006618; border-color: var(--accent); }
  .swatch-chip {
    width: 28px; height: 28px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }
  .swatch-info { min-width: 0; }
  .swatch-name {
    font-size: 12px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 160px;
  }
  .swatch-hex { font-size: 10px; color: var(--fg2); font-family: 'Cascadia Code', monospace; }

  /* ── Main Panel ────────────────────────── */
  .main-panel {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* ── Detail Header ─────────────────────── */
  .detail-header {
    display: flex; gap: 28px; padding: 24px 32px;
    background: var(--bg2); border-bottom: 1px solid var(--bg3);
    align-items: stretch; min-height: 200px;
  }
  .color-preview {
    width: 180px; min-height: 160px; border-radius: 16px;
    border: 2px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; transition: background-color 0.3s;
    position: relative; overflow: hidden;
  }
  .color-preview .label {
    padding: 4px 10px; border-radius: 6px;
    backdrop-filter: blur(4px);
  }

  .detail-info { flex: 1; display: flex; flex-direction: column; gap: 12px; }
  .detail-name { font-size: 24px; font-weight: 800; }
  .detail-group { font-size: 12px; color: var(--fg2); text-transform: uppercase; letter-spacing: 1px; }

  .value-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 8px; margin-top: 4px;
  }
  .value-card {
    background: var(--bg); border: 1px solid var(--bg3);
    border-radius: 8px; padding: 10px 12px;
    cursor: pointer; transition: all 0.15s;
    position: relative;
  }
  .value-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .value-card .label { font-size: 10px; color: var(--fg2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .value-card .value { font-size: 14px; font-weight: 700; font-family: 'Cascadia Code', monospace; }
  .copied-toast {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: var(--accent); color: #fff; padding: 2px 8px;
    border-radius: 4px; font-size: 10px; font-weight: 700;
    opacity: 0; transition: opacity 0.2s; pointer-events: none;
  }
  .copied-toast.show { opacity: 1; }

  .css-snippets {
    display: flex; gap: 8px; margin-top: auto; flex-wrap: wrap;
  }
  .css-btn {
    padding: 6px 14px; font-size: 11px; font-weight: 600;
    background: var(--bg); border: 1px solid var(--bg3);
    border-radius: 6px; color: var(--fg2); cursor: pointer;
    font-family: 'Cascadia Code', monospace;
    transition: all 0.15s;
  }
  .css-btn:hover { border-color: var(--accent); color: var(--fg); }

  /* ── Color Wheel + Grid ────────────────── */
  .viz-area {
    flex: 1; display: flex; overflow: hidden;
  }
  .wheel-panel {
    width: 340px; padding: 24px;
    display: flex; flex-direction: column; align-items: center;
    gap: 16px; border-right: 1px solid var(--bg3);
  }
  .wheel-panel h3 { font-size: 13px; color: var(--fg2); text-transform: uppercase; letter-spacing: 1px; }
  #wheelCanvas { cursor: crosshair; }
  .wheel-legend { font-size: 11px; color: #71717a; text-align: center; line-height: 1.6; }

  .grid-panel {
    flex: 1; padding: 20px; overflow-y: auto;
  }
  .grid-panel::-webkit-scrollbar { width: 6px; }
  .grid-panel::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
  .grid-panel h3 {
    font-size: 13px; color: var(--fg2); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 12px;
  }
  .color-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(36px, 1fr));
    gap: 4px;
  }
  .grid-cell {
    aspect-ratio: 1; border-radius: 4px;
    cursor: pointer; transition: transform 0.1s, box-shadow 0.15s;
    border: 1px solid rgba(255,255,255,0.04);
    position: relative;
  }
  .grid-cell:hover {
    transform: scale(1.4); z-index: 10;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    border-color: rgba(255,255,255,0.3);
  }
  .grid-cell.selected {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
    transform: scale(1.3);
    z-index: 9;
  }
  .grid-cell .tooltip {
    display: none; position: absolute; bottom: calc(100% + 6px); left: 50%;
    transform: translateX(-50%);
    background: var(--bg2); border: 1px solid var(--bg3);
    padding: 4px 8px; border-radius: 4px;
    font-size: 10px; white-space: nowrap; z-index: 20;
    pointer-events: none;
  }
  .grid-cell:hover .tooltip { display: block; }

  /* ── Responsive ────────────────────────── */
  @media (max-width: 1100px) {
    .wheel-panel { display: none; }
  }
  @media (max-width: 768px) {
    .app { flex-direction: column; height: auto; }
    .sidebar { width: 100%; height: auto; max-height: 50vh; }
    .detail-header { flex-direction: column; }
    .color-preview { width: 100%; min-height: 100px; }
  }
</style>
</head>
<body>
<header>
  <h1>FREETONE</h1>
  <span class="badge">1,280 COLORS</span>
  <span class="subtitle">Parsed from freetone.ase &mdash; Interactive Color Picker</span>
</header>

<div class="app">
  <!-- Sidebar: search + swatch list -->
  <div class="sidebar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search colors by name or hex..." />
    </div>
    <div class="sort-row">
      <button class="sort-btn active" data-sort="default">Default</button>
      <button class="sort-btn" data-sort="hue">Hue</button>
      <button class="sort-btn" data-sort="light">Lightness</button>
      <button class="sort-btn" data-sort="sat">Saturation</button>
      <button class="sort-btn" data-sort="name">A → Z</button>
    </div>
    <div class="group-filters" id="groupFilters"></div>
    <div class="swatch-count" id="swatchCount">1,280 colors</div>
    <div class="swatch-list" id="swatchList"></div>
  </div>

  <!-- Main -->
  <div class="main-panel">
    <!-- Detail header -->
    <div class="detail-header" id="detailHeader">
      <div class="color-preview" id="colorPreview" style="background:#FF0066;">
        <span class="label" id="previewLabel" style="color:#fff">#FF0066</span>
      </div>
      <div class="detail-info">
        <div class="detail-group" id="detailGroup">SIGNATURE</div>
        <div class="detail-name" id="detailName">Pinkest Pink</div>
        <div class="value-grid" id="valueGrid"></div>
        <div class="css-snippets" id="cssSnippets"></div>
      </div>
    </div>

    <!-- Wheel + Grid -->
    <div class="viz-area">
      <div class="wheel-panel">
        <h3>Color Wheel</h3>
        <canvas id="wheelCanvas" width="280" height="280"></canvas>
        <div class="wheel-legend">
          Dots show all palette colors by hue &amp; saturation.<br/>
          Click any dot to select. Ring = selected color.
        </div>
      </div>
      <div class="grid-panel">
        <h3 id="gridTitle">All Swatches</h3>
        <div class="color-grid" id="colorGrid"></div>
      </div>
    </div>
  </div>
</div>

// ─── STATE ──────────────────────────────────────────────────
let filtered = [...ALL_COLORS];
let selectedIdx = 0;
let currentSort = "default";
let activeGroups = new Set();

// ─── INIT ───────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  buildGroupFilters();
  applyFilters();
  selectColor(0);
  drawWheel();

  document.getElementById("searchInput").addEventListener("input", () => {
    applyFilters(); drawWheel();
  });

  document.querySelectorAll(".sort-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentSort = btn.dataset.sort;
      applyFilters(); drawWheel();
    });
  });
});

// ─── GROUP FILTERS ──────────────────────────────────────────
function buildGroupFilters() {
  const groups = [...new Set(ALL_COLORS.map(c => c.group))];
  const container = document.getElementById("groupFilters");
  groups.forEach(g => {
    const btn = document.createElement("button");
    btn.className = "group-btn";
    btn.textContent = g;
    btn.addEventListener("click", () => {
      if (activeGroups.has(g)) { activeGroups.delete(g); btn.classList.remove("active"); }
      else { activeGroups.add(g); btn.classList.add("active"); }
      applyFilters(); drawWheel();
    });
    container.appendChild(btn);
  });
}

// ─── FILTERING & SORTING ────────────────────────────────────
function applyFilters() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();

  filtered = ALL_COLORS.filter(c => {
    if (activeGroups.size > 0 && !activeGroups.has(c.group)) return false;
    if (q && !c.name.toLowerCase().includes(q) && !c.hex.toLowerCase().includes(q)) return false;
    return true;
  });

  if (currentSort === "hue")       filtered.sort((a,b) => a.h - b.h);
  else if (currentSort === "light") filtered.sort((a,b) => a.l_pct - b.l_pct);
  else if (currentSort === "sat")   filtered.sort((a,b) => b.s_pct - a.s_pct);
  else if (currentSort === "name")  filtered.sort((a,b) => a.name.localeCompare(b.name));

  document.getElementById("swatchCount").textContent =
    filtered.length.toLocaleString() + " color" + (filtered.length !== 1 ? "s" : "");

  renderSwatchList();
  renderGrid();

  const selInFiltered = filtered.findIndex(c => c === ALL_COLORS[selectedIdx]);
  if (selInFiltered === -1 && filtered.length > 0) selectColor(ALL_COLORS.indexOf(filtered[0]));
}

// ─── SWATCH LIST ────────────────────────────────────────────
function renderSwatchList() {
  const container = document.getElementById("swatchList");
  container.innerHTML = "";

  // Virtual-ish rendering — we'll cap visible list to filtered set
  filtered.forEach((c, i) => {
    const div = document.createElement("div");
    div.className = "swatch-item" + (ALL_COLORS.indexOf(c) === selectedIdx ? " selected" : "");
    div.innerHTML = `
      <div class="swatch-chip" style="background:${c.hex}"></div>
      <div class="swatch-info">
        <div class="swatch-name">${c.name}</div>
        <div class="swatch-hex">${c.hex}</div>
      </div>`;
    div.addEventListener("click", () => {
      selectColor(ALL_COLORS.indexOf(c));
    });
    container.appendChild(div);
  });
}

// ─── COLOR GRID ─────────────────────────────────────────────
function renderGrid() {
  const container = document.getElementById("colorGrid");
  container.innerHTML = "";
  filtered.forEach((c, i) => {
    const div = document.createElement("div");
    div.className = "grid-cell" + (ALL_COLORS.indexOf(c) === selectedIdx ? " selected" : "");
    div.style.background = c.hex;
    div.innerHTML = `<div class="tooltip">${c.name}<br/>${c.hex}</div>`;
    div.addEventListener("click", () => selectColor(ALL_COLORS.indexOf(c)));
    container.appendChild(div);
  });
  document.getElementById("gridTitle").textContent =
    (activeGroups.size === 1 ? [...activeGroups][0] : "All Swatches") +
    ` (${filtered.length})`;
}

// ─── SELECT COLOR ───────────────────────────────────────────
function selectColor(idx) {
  selectedIdx = idx;
  const c = ALL_COLORS[idx];
  const lum = (0.299*c.r + 0.587*c.g + 0.114*c.b);
  const textColor = lum > 140 ? "#000" : "#fff";

  document.getElementById("colorPreview").style.background = c.hex;
  const label = document.getElementById("previewLabel");
  label.textContent = c.hex;
  label.style.color = textColor;
  label.style.background = lum > 140 ? "rgba(0,0,0,0.12)" : "rgba(255,255,255,0.12)";

  document.getElementById("detailName").textContent = c.name;
  document.getElementById("detailGroup").textContent = c.group;

  const cmyk = c.cmyk.split(",").map(Number);

  const vals = [
    { label: "HEX", value: c.hex },
    { label: "RGB", value: `${c.r}, ${c.g}, ${c.b}` },
    { label: "HSL", value: `${c.h}°, ${c.s_pct}%, ${c.l_pct}%` },
    { label: "CMYK", value: `${cmyk[0]}, ${cmyk[1]}, ${cmyk[2]}, ${cmyk[3]}` },
    { label: "CSS rgb()", value: `rgb(${c.r}, ${c.g}, ${c.b})` },
    { label: "CSS hsl()", value: `hsl(${c.h}, ${c.s_pct}%, ${c.l_pct}%)` },
  ];

  const grid = document.getElementById("valueGrid");
  grid.innerHTML = vals.map(v => `
    <div class="value-card" onclick="copyValue(this, '${v.value.replace(/'/g, "\\'")}')">
      <div class="label">${v.label}</div>
      <div class="value">${v.value}</div>
      <div class="copied-toast">Copied!</div>
    </div>`).join("");

  const snippets = document.getElementById("cssSnippets");
  snippets.innerHTML = [
    `color: ${c.hex};`,
    `background: ${c.hex};`,
    `border: 2px solid ${c.hex};`,
    `box-shadow: 0 4px 12px ${c.hex}80;`
  ].map(s => `<button class="css-btn" onclick="copyValue(this, '${s}')">${s}</button>`).join("");

  // Update list + grid selection
  document.querySelectorAll(".swatch-item.selected").forEach(el => el.classList.remove("selected"));
  document.querySelectorAll(".grid-cell.selected").forEach(el => el.classList.remove("selected"));

  const filteredIdx = filtered.indexOf(c);
  if (filteredIdx >= 0) {
    const listItems = document.querySelectorAll(".swatch-item");
    const gridItems = document.querySelectorAll(".grid-cell");
    if (listItems[filteredIdx]) {
      listItems[filteredIdx].classList.add("selected");
      listItems[filteredIdx].scrollIntoView({ block: "nearest" });
    }
    if (gridItems[filteredIdx]) gridItems[filteredIdx].classList.add("selected");
  }

  drawWheel();
}

// ─── COPY ───────────────────────────────────────────────────
function copyValue(el, val) {
  navigator.clipboard.writeText(val).then(() => {
    const toast = el.querySelector(".copied-toast") || el;
    if (toast.classList) { toast.classList.add("show"); setTimeout(() => toast.classList.remove("show"), 800); }
  });
}

// ─── COLOR WHEEL ────────────────────────────────────────────
function drawWheel() {
  const canvas = document.getElementById("wheelCanvas");
  const ctx = canvas.getContext("2d");
  const w = canvas.width, h = canvas.height;
  const cx = w/2, cy = h/2, radius = 130;

  ctx.clearRect(0, 0, w, h);

  // Draw hue ring background
  for (let a = 0; a < 360; a++) {
    const rad = (a - 90) * Math.PI / 180;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, rad, rad + Math.PI/180 + 0.01);
    ctx.arc(cx, cy, radius - 18, rad + Math.PI/180 + 0.01, rad, true);
    ctx.fillStyle = `hsl(${a}, 80%, 50%)`;
    ctx.fill();
  }

  // Plot dots
  filtered.forEach((c, i) => {
    const aRad = (c.h - 90) * Math.PI / 180;
    const dist = (c.s_pct / 100) * (radius - 28);
    const x = cx + Math.cos(aRad) * dist;
    const y = cy + Math.sin(aRad) * dist;
    ctx.beginPath();
    ctx.arc(x, y, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = c.hex;
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.15)";
    ctx.lineWidth = 0.5;
    ctx.stroke();
  });

  // Draw selected color indicator
  const sel = ALL_COLORS[selectedIdx];
  const selRad = (sel.h - 90) * Math.PI / 180;
  const selDist = (sel.s_pct / 100) * (radius - 28);
  const sx = cx + Math.cos(selRad) * selDist;
  const sy = cy + Math.sin(selRad) * selDist;

  ctx.beginPath();
  ctx.arc(sx, sy, 8, 0, Math.PI * 2);
  ctx.strokeStyle = "#fff";
  ctx.lineWidth = 2.5;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(sx, sy, 5, 0, Math.PI * 2);
  ctx.fillStyle = sel.hex;
  ctx.fill();

  // Click handler
  canvas.onclick = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (w / rect.width);
    const my = (e.clientY - rect.top) * (h / rect.height);
    let bestDist = Infinity, bestIdx = -1;
    filtered.forEach((c, i) => {
      const aRad2 = (c.h - 90) * Math.PI / 180;
      const dist2 = (c.s_pct / 100) * (radius - 28);
      const px = cx + Math.cos(aRad2) * dist2;
      const py = cy + Math.sin(aRad2) * dist2;
      const d = Math.hypot(mx - px, my - py);
      if (d < bestDist) { bestDist = d; bestIdx = i; }
    });
    if (bestDist < 15 && bestIdx >= 0) selectColor(ALL_COLORS.indexOf(filtered[bestIdx]));
  };
}
