<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background circle -->
  <circle cx="50" cy="50" r="50" fill="#0a0e1a"/>

  <!-- Outer glow ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>

  <!-- Speed lines (warp effect) -->
  <line x1="8" y1="50" x2="20" y2="50" stroke="#00d4ff" stroke-width="2" opacity="0.3"/>
  <line x1="80" y1="50" x2="92" y2="50" stroke="#00d4ff" stroke-width="2" opacity="0.3"/>
  <line x1="5" y1="42" x2="15" y2="42" stroke="#00d4ff" stroke-width="1.5" opacity="0.2"/>
  <line x1="85" y1="42" x2="95" y2="42" stroke="#00d4ff" stroke-width="1.5" opacity="0.2"/>
  <line x1="5" y1="58" x2="15" y2="58" stroke="#00d4ff" stroke-width="1.5" opacity="0.2"/>
  <line x1="85" y1="58" x2="95" y2="58" stroke="#00d4ff" stroke-width="1.5" opacity="0.2"/>

  <!-- The W shape -->
  <polyline points="17,28 34,72 46,45 58,72 75,28"
    fill="none"
    stroke="#00d4ff"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- W with glow -->
  <polyline points="17,28 34,72 46,45 58,72 75,28"
    fill="none"
    stroke="#00d4ff"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
    opacity="0.7"/>
</svg>
