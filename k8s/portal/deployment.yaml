apiVersion: apps/v1
kind: Deployment
metadata:
  name: warp-portal
  namespace: warp-business
spec:
  replicas: 1
  selector:
    matchLabels:
      app: warp-portal
  template:
    metadata:
      labels:
        app: warp-portal
    spec:
      containers:
      - name: warp-portal
        image: warp-business/portal:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: warp-portal-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 3
