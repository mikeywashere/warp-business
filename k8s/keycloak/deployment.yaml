apiVersion: apps/v1
kind: Deployment
metadata:
  name: warp-keycloak
  namespace: warp-business
spec:
  replicas: 1
  selector:
    matchLabels:
      app: warp-keycloak
  template:
    metadata:
      labels:
        app: warp-keycloak
    spec:
      containers:
      - name: keycloak
        image: quay.io/keycloak/keycloak:24.0
        args: [start-dev]
        ports:
        - containerPort: 8080
        env:
        - name: KEYCLOAK_ADMIN
          value: admin
        - name: KEYCLOAK_ADMIN_PASSWORD
          value: admin
        - name: KC_DB
          value: postgres
        - name: KC_DB_URL
          value: jdbc:postgresql://warp-postgres:5432/warpbusiness
        - name: KC_DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: warp-secrets
              key: postgres-user
        - name: KC_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: warp-secrets
              key: postgres-password
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
